on:
  push:
    branches:
      - "prerelease/*"
name: prerelease

permissions:
  contents: write # Required for creating releases
  pull-requests: write # Required for release-please to create/update PRs
jobs:
  prerelease:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Create app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create release commits and tags
          permission-pull-requests: write # to create release PRs

      - name: Extract branch name
        shell: bash
        run: echo "branch=$(echo "${GITHUB_REF#refs/heads/}")" >> $GITHUB_OUTPUT
        id: extract_branch
      - uses: google-github-actions/release-please-action@db8f2c60ee802b3748b512940dde88eabd7b7e01 # v3.7.13
        id: release_action
        with:
          token: ${{ steps.app-token.outputs.token }}
          pull-request-title-pattern: "chore: prerelease ${version}"
          release-type: go
          package-name: rudder-server
          default-branch: ${{ steps.extract_branch.outputs.branch }}
          changelog-types: '
            [
            {
            "type": "feat",
            "section": "Features",
            "hidden": false
            },
            {
            "type": "fix",
            "section": "Bug Fixes",
            "hidden": false
            },
            {
            "type": "chore",
            "section":"Miscellaneous",
            "hidden": false},
            {
            "type": "refactor",
            "section": "Miscellaneous",
            "hidden": false
            },
            {
            "type": "test",
            "section": "Miscellaneous",
            "hidden": false
            },
            {
            "type": "doc",
            "section": "Documentation",
            "hidden": false
            }
            ]'
          prerelease: true
          release-as: ${{ steps.extract_branch.outputs.branch }}
