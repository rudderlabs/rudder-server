name: PR Review Site

# Gated on a label (default: "ai-preview"). The preview is built ONLY when the
# label is applied (or removed and reapplied). Pushing new commits to the PR
# does NOT regenerate the preview — re-add the label to refresh it.
#   - label "ai-preview" added         -> Codex explores the repo and builds/deploys the site
#   - PR closed/merged                 -> tear the preview down
# Removing the label does NOT tear the preview down — only closing the PR does.
on:
  pull_request:
    types: [ labeled, closed ]

concurrency:
  group: pr-review-site-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# The default GITHUB_TOKEN only needs to read the repo for checkout. All writes
# (gh-pages push, sticky comment) go through the app token, which carries its own
# scoped permissions. Keeping this read-only means a leaked/persisted GITHUB_TOKEN
# cannot write anything
permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Build/deploy only when the "ai-preview" label is the one just applied. Tear
    # down on any PR close (regardless of label). Skip fork PRs since secrets
    # aren't available to them. Change the label name in BOTH places to rename
    # it (the env context isn't available in a job-level `if`).
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        (github.event.action == 'labeled' && github.event.label.name == 'ai-preview') ||
        github.event.action == 'closed'
      )
    steps:
      - name: Create app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write       # push to gh-pages
          permission-pull-requests: write  # upsert sticky preview comment

      # ---- Build the site (only on deploy events: open / push / (re)label) ----
      - name: Checkout PR head (full history)
        if: github.event.action != 'closed'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0   # Codex needs the whole repo + history for context
          # Don't leave GITHUB_TOKEN in .git/config where Codex-spawned commands
          # could read it (the workspace permission profile confines writes, not
          # reads). Nothing after checkout needs these credentials: fetch-depth 0
          # pulls all history up front, and every push/API call uses the app
          # token over its own authenticated remote.
          persist-credentials: false

      - name: Collect PR context
        if: github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          gh pr diff "$PR_NUMBER" --patch > pr.diff \
            || git diff "origin/${BASE_REF}...HEAD" > pr.diff
          # Build meta.txt with printf so attacker-controlled fields are treated
          # as data, never interpreted by the shell.
          {
            printf 'Repository: %s\n' "$GITHUB_REPOSITORY"
            printf 'PR number: #%s\n' "$PR_NUMBER"
            printf 'Title: %s\n' "$PR_TITLE"
            printf 'Author: %s\n' "$PR_AUTHOR"
            printf 'Base <- Head: %s <- %s\n' "$BASE_REF" "$HEAD_REF"
            printf '\nDescription:\n%s\n' "$PR_BODY"
            printf '\nCommits:\n'
            git log --format='- %s' "origin/${BASE_REF}..HEAD" || true
          } > meta.txt
          echo "diff size: $(wc -c < pr.diff) bytes"

      - name: Setup Node
        if: github.event.action != 'closed'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      # codex-action takes ONE prompt file per invocation, so pre-assemble each
      # stage's prompt (_shared.md + <stage>.md) outside the workspace. Also
      # resolve the Azure Responses endpoint once (via GITHUB_ENV — step outputs
      # refuse secret-derived values) and pre-create the stage output dirs.
      - name: Prepare Codex prompts and endpoint
        if: github.event.action != 'closed'
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
        run: |
          set -euo pipefail
          echo "RESPONSES_API_ENDPOINT=${AZURE_OPENAI_ENDPOINT%/}/openai/v1/responses" >> "$GITHUB_ENV"
          mkdir -p "${RUNNER_TEMP}/codex-prompts" review-work/diagrams review-site
          for stage in analyze diagrams risks assemble; do
            cat .github/codex/agents/_shared.md ".github/codex/agents/${stage}.md" \
              > "${RUNNER_TEMP}/codex-prompts/${stage}.md"
          done

      # ---- Specialised subagents (sequential pipeline via review-work/) ----
      # Each subagent is one openai/codex-action invocation with a focused,
      # pre-assembled prompt, handing artifacts to the next stage through
      # review-work/. A validation step after each stage fails the job with a
      # clear step name if the stage produced nothing usable. review-work/
      # never leaves the runner — only review-site/ is deployed.
      #
      # Why the action instead of raw `codex exec`:
      #  - the API key is held by the action's local proxy, NOT exported into
      #    the Codex process env where spawned commands could printenv it;
      #  - safety-strategy drop-sudo revokes the runner user's sudo before
      #    Codex runs (hosted runners have passwordless sudo otherwise);
      #  - permission-profile ':workspace' confines writes to the checkout —
      #    if it ever errors on this runner image, drop the input (key proxy +
      #    drop-sudo still apply) rather than reverting to raw codex exec.
      # exec mode never prompts for approvals; there is nothing to approve.
      #
      # drop-sudo is one-shot and lasts for the rest of the job: the drop itself
      # needs sudo, so a second drop-sudo invocation fails ("passwordless sudo
      # not available"). Only Subagent 1 declares drop-sudo; Subagents 2-4
      # declare 'unsafe', which here means "don't re-drop" — they still run
      # without sudo because Subagent 1 already revoked it for the whole job.
      - name: 'Subagent 1: analyze PR'
        if: github.event.action != 'closed'
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1.11
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: ${{ env.RESPONSES_API_ENDPOINT }}
          model: gpt-5.3-codex   # Azure Foundry deployment name (latest Codex)
          effort: medium
          codex-version: 0.144.6  # pinned; bump intentionally
          safety-strategy: drop-sudo
          permission-profile: ':workspace'
          prompt-file: ${{ runner.temp }}/codex-prompts/analyze.md

      - name: Validate analysis artifact
        if: github.event.action != 'closed'
        run: jq empty review-work/analysis.json  # exists AND is valid JSON

      - name: 'Subagent 2: author diagrams'
        if: github.event.action != 'closed'
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1.11
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: ${{ env.RESPONSES_API_ENDPOINT }}
          model: gpt-5.3-codex
          effort: medium
          codex-version: 0.144.6
          safety-strategy: unsafe  # sudo already dropped by Subagent 1
          permission-profile: ':workspace'
          prompt-file: ${{ runner.temp }}/codex-prompts/diagrams.md

      - name: Validate diagram artifacts
        if: github.event.action != 'closed'
        run: |
          set -euo pipefail
          # Manifest must exist, be valid JSON, contain at least one diagram (the
          # prompt mandates 2-4 — an empty manifest means the stage failed), and
          # every entry must point to a real SVG file.
          jq empty review-work/diagrams.json
          echo "diagram manifest:" && jq . review-work/diagrams.json
          count="$(jq 'length' review-work/diagrams.json)"
          if [ "$count" -lt 1 ]; then
            echo "Diagram stage produced an empty manifest; failing."
            exit 1
          fi
          missing=0
          while read -r f; do
            if [ ! -f "review-work/diagrams/$f" ]; then
              echo "Manifest entry $f has no SVG file in review-work/diagrams/."
              missing=1
            fi
          done < <(jq -r '.[].file' review-work/diagrams.json)
          [ "$missing" -eq 0 ]

      - name: 'Subagent 3: review risks'
        if: github.event.action != 'closed'
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1.11
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: ${{ env.RESPONSES_API_ENDPOINT }}
          model: gpt-5.3-codex
          effort: medium
          codex-version: 0.144.6
          safety-strategy: unsafe  # sudo already dropped by Subagent 1
          permission-profile: ':workspace'
          prompt-file: ${{ runner.temp }}/codex-prompts/risks.md

      - name: Validate risks artifact
        if: github.event.action != 'closed'
        run: jq empty review-work/risks.json

      - name: 'Subagent 4: assemble site'
        if: github.event.action != 'closed'
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1.11
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: ${{ env.RESPONSES_API_ENDPOINT }}
          model: gpt-5.3-codex
          effort: medium
          codex-version: 0.144.6
          safety-strategy: unsafe  # sudo already dropped by Subagent 1
          permission-profile: ':workspace'
          prompt-file: ${{ runner.temp }}/codex-prompts/assemble.md

      - name: Validate assembled site
        if: github.event.action != 'closed'
        run: |
          set -euo pipefail
          test -f review-site/index.html  # fail the job if Codex produced nothing
          # Every diagram in the manifest must be embedded inline: the assembler
          # marks each embedded figure with data-diagram="<file>". A page that
          # references review-work/ instead would 404 — that dir never deploys.
          missing=0
          while read -r f; do
            # Accept either quote style around the attribute value.
            if ! grep -qF "data-diagram=\"$f\"" review-site/index.html \
               && ! grep -qF "data-diagram='$f'" review-site/index.html; then
              echo "Diagram $f from the manifest is not embedded in index.html."
              missing=1
            fi
          done < <(jq -r '.[].file' review-work/diagrams.json)
          if [ "$missing" -ne 0 ]; then
            echo "data-diagram attributes actually present in index.html:"
            grep -o 'data-diagram=[^ >]*' review-site/index.html || echo "(none)"
            exit 1
          fi
          # Only attribute references (src/href) to review-work/ are a problem —
          # they would 404 since that dir never deploys. The string may appear
          # legitimately in prose/snippets when the PR itself touches the pipeline.
          if grep -Eq '(src|href)="[^"]*review-work/' review-site/index.html; then
            echo "index.html loads assets from review-work/ (not deployed); failing."
            grep -Eo '(src|href)="[^"]*review-work/[^"]*"' review-site/index.html
            exit 1
          fi
          # Inline <script> blocks must be valid JS (a syntax error silently kills
          # all page interactivity).
          node -e '
            const fs = require("fs");
            const html = fs.readFileSync("review-site/index.html", "utf8");
            const re = /<script[^>]*>([\s\S]*?)<\/script>/gi;
            let m, n = 0, bad = 0;
            while ((m = re.exec(html))) {
              n++;
              try { new Function(m[1]); }
              catch (e) { console.error(`script block ${n}: ${e.message}`); bad = 1; }
            }
            if (n === 0) { console.error("no inline <script> found"); bad = 1; }
            process.exit(bad);
          '
          # Un-rendered JSON objects pasted into visible text (e.g. <li>{'name': ...})
          # mean the assembler dumped artifacts instead of rendering their fields.
          if grep -Eq "<(li|p|td|span)>\{('|\")" review-site/index.html; then
            echo "index.html contains raw object dumps instead of rendered fields; failing."
            grep -Eo "<(li|p|td|span)>\{('|\")[^<]{0,80}" review-site/index.html | head -5
            exit 1
          fi

      # ---- Deploy on label/open/push; tear down on close/merge ----
      - name: Stage built site outside the worktree
        if: github.event.action != 'closed'
        run: |
          set -euo pipefail
          rm -rf "${RUNNER_TEMP}/preview-site"
          cp -R review-site "${RUNNER_TEMP}/preview-site"

      - name: Deploy preview to gh-pages
        if: github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          UMBRELLA_DIR: pr-preview
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          workdir="${RUNNER_TEMP}/gh-pages"
          rm -rf "$workdir"
          remote="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          if git ls-remote --exit-code --heads "$remote" gh-pages >/dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "$remote" "$workdir"
          else
            # Initialize a clean orphan gh-pages branch with NO files from master.
            # (git clone + --orphan keeps the master worktree around; that pollutes
            # Pages with symlinks and breaks the pages-build-deployment artifact upload.)
            mkdir -p "$workdir"
            git -C "$workdir" init -q -b gh-pages
            git -C "$workdir" remote add origin "$remote"
          fi

          # Defensive: drop any tracked files that aren't under our umbrella or the
          # .nojekyll marker. Protects against an earlier bad commit that may have
          # introduced repo files (symlinks, Go vendor, etc.) onto gh-pages.
          mapfile -t stray < <(git -C "$workdir" ls-files \
            | grep -Ev "^(${UMBRELLA_DIR}/|\.nojekyll$)" || true)
          if [ "${#stray[@]}" -gt 0 ]; then
            printf '%s\n' "${stray[@]}" | xargs -d '\n' git -C "$workdir" rm -q --
          fi

          target="${workdir}/${UMBRELLA_DIR}/pr-${PR_NUMBER}"
          rm -rf "$target"
          mkdir -p "$target"
          cp -R "${RUNNER_TEMP}/preview-site"/. "$target"/
          touch "${workdir}/.nojekyll"

          # Reject symlinks before pushing — Pages refuses to upload them.
          if find "$workdir/${UMBRELLA_DIR}/pr-${PR_NUMBER}" -type l | grep -q .; then
            echo "Preview site contains symlinks; refusing to deploy."
            find "$workdir/${UMBRELLA_DIR}/pr-${PR_NUMBER}" -type l
            exit 1
          fi

          git -C "$workdir" add -A
          if git -C "$workdir" diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git -C "$workdir" commit -m "Deploy preview for PR #${PR_NUMBER}"
            git -C "$workdir" push origin gh-pages
          fi

      - name: Checkout for cleanup
        if: github.event.action == 'closed'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false  # teardown pushes via the app-token remote

      - name: Remove preview from gh-pages
        if: github.event.action == 'closed'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          UMBRELLA_DIR: pr-preview
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          remote="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          if ! git ls-remote --exit-code --heads "$remote" gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch does not exist; nothing to remove."
            exit 0
          fi
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          workdir="${RUNNER_TEMP}/gh-pages"
          rm -rf "$workdir"
          git clone --depth=1 --branch gh-pages "$remote" "$workdir"

          target="${workdir}/${UMBRELLA_DIR}/pr-${PR_NUMBER}"
          if [ ! -d "$target" ]; then
            echo "No preview directory at $target; nothing to remove."
            exit 0
          fi

          git -C "$workdir" rm -rf "${UMBRELLA_DIR}/pr-${PR_NUMBER}"
          git -C "$workdir" commit -m "Remove preview for PR #${PR_NUMBER}"
          git -C "$workdir" push origin gh-pages

      - name: Upsert sticky preview comment
        if: github.event.action != 'closed'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          owner="${REPO%/*}"
          repo="${REPO#*/}"
          preview_url="https://${owner}.github.io/${repo}/pr-preview/pr-${PR_NUMBER}/"
          marker="<!-- pr-preview-comment -->"
          body="$(printf '%s\n## PR preview\n\n[View the preview](%s)\n\nUpdated for commit %s.\n' \
            "$marker" "$preview_url" "$HEAD_SHA")"

          existing_id="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq "map(select(.body | startswith(\"${marker}\"))) | .[0].id // empty")"

          if [ -n "$existing_id" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${existing_id}" -f body="$body" >/dev/null
          else
            gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$body" >/dev/null
          fi

      - name: Update sticky comment on teardown
        if: github.event.action == 'closed'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          marker="<!-- pr-preview-comment -->"
          body="$(printf '%s\nPR preview was removed.\n' "$marker")"
          existing_id="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq "map(select(.body | startswith(\"${marker}\"))) | .[0].id // empty")"
          if [ -n "$existing_id" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${existing_id}" -f body="$body" >/dev/null
          fi
