name: verify
on:
  push:
    tags:
      - v*
    branches:
      - master
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read # Required for actions/checkout
jobs:
  generate:
    name: Correct generated files
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - run: go version

      - run: go mod tidy
      - run: git diff --exit-code go.mod
      - name: Error message
        if: ${{ failure() }}
        run: echo '::error file=go.mod,line=1,col=1::Inconsistent go mod file. Ensure you have run `go mod tidy` and committed the files locally.'; echo '::error file=enterprise_mod.go,line=1,col=1::Possible missing enterprise exclusive dependencies.'

      - name: Check for pseudo-version rudderlabs dependencies
        run: |
          # Matches pseudo-versions like:
          #   v0.0.0-20260211072500-0c7ccaf1aa80
          #   v0.72.2-0.20260211072500-0c7ccaf1aa80
          #   v0.72.2-pre.0.20260211072500-0c7ccaf1aa80
          # The regex matches a 14-digit timestamp followed by a 12-char commit hash at the end.
          VIOLATIONS=$(go list -m -json all | jq -r '
            select(.Path | startswith("github.com/rudderlabs/")) |
            select(.Version | test("[0-9]{14}-[a-f0-9]{12}$")) |
            "\(.Path)@\(.Version)"
          ')
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: Pseudo-version dependencies detected for rudderlabs modules:"
            echo "$VIOLATIONS"
            echo "Please use a proper tagged release instead."
            exit 1
          fi

      - run: make mocks
      - run: git diff --exit-code
      - name: Error message
        if: ${{ failure() }}
        run: echo '::error file=Makefile,line=11,col=1::Incorrectly generated files. Ensure you have run `make mocks` and committed the files locally.'

      - name: install protoc compiler
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: '25.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: make proto
      - run: git diff -I '^\/\/\s+-?\s+protoc\s+v' --exit-code ## Ignore protoc version comment
      - name: Error message
        if: ${{ failure() }}
        run: echo 'proto files are not generated correctly. Ensure you have run `make proto` and committed the files locally.'
      - run: git checkout proto ## cleanup tree due to protoc version comment

      - run: make fmt
      - run: git diff --exit-code
      - name: Error message
        if: ${{ failure() }}
        run: echo 'Not formatted files. Ensure you have run `make fmt` and committed the files locally.'
      - name: Validate OpenAPI definition
        run: npx --yes @apidevtools/swagger-cli@4.0.4 validate gateway/openapi.yaml

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ vars.DOCKERHUB_READONLY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_READONLY_TOKEN }}

      - run: make generate-openapi-spec
      - run: git diff --exit-code
      - name: Error message
        if: ${{ failure() }}
        run: echo 'Not correctly generated openapi spec. Ensure you have run `make generate-openapi-spec` and committed the files locally.'
  linting:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.9.0
          args: -v
